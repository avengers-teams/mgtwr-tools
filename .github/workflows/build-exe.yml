name: Build and Release with Nuitka

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version_tag:
        description: "手动填写的版本号 (例如: v1.0.2)"
        required: true
        default: "v1.0.2-test"

permissions:
  contents: write

env:
  APP_EXE_NAME: main.exe
  PRODUCT_NAME: 多功能数据分析处理工具
  COMPANY_NAME: Yserver

jobs:
  build:
    runs-on: windows-latest
    outputs:
      version_tag: ${{ steps.meta.outputs.version_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x64"

      - name: Resolve version tag
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ github.event.inputs.version_tag }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "未解析到版本号"
          }
          "version_tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Read app version
        id: app_version
        shell: pwsh
        run: |
          $version = (Get-Content version | Select-Object -First 1).Trim()
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "version 文件为空"
          }
          "app_version=$version" >> $env:GITHUB_OUTPUT

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: main.py
          mode: onefile
          mingw64: true
          show-memory: true
          output-dir: out
          enable-plugins: pyqt5
          windows-console-mode: disable
          product-name: ${{ env.PRODUCT_NAME }}
          company-name: ${{ env.COMPANY_NAME }}
          product-version: ${{ steps.app_version.outputs.app_version }}
          file-version: ${{ steps.app_version.outputs.app_version }}
          file-description: ${{ env.PRODUCT_NAME }}
          windows-icon-from-ico: assets/icons/favicon.ico
          include-data-dir: ./assets=assets
          include-data-files: ./version=version
          include-qt-plugins: all
          assume-yes-for-downloads: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe
          path: out/${{ env.APP_EXE_NAME }}
          if-no-files-found: error
          include-hidden-files: true

  release:
    runs-on: windows-latest
    needs: build

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: exe
          path: out

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version_tag }}
          name: Release ${{ needs.build.outputs.version_tag }}
          files: out/${{ env.APP_EXE_NAME }}
          draft: false
          prerelease: false
